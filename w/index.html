      body{

       background-color: #222222;
       color: #787878;
       margin: 10px;

       justify-content: center;

       font-family: Arial, sans-serif;
       /* Define la tipografía del texto */

        /* Define el tamaño grande del texto */
        
        }

        .contenedor {

            margin: 20px auto;
          
        }

        .bloque {
            background-color: #333;
            margin: 20px 20px;

            border-radius: 10px;
            
            
        }
        img { /* Aplica a todas las imágenes */
          width: 300px; /* Ancho fijo */
          height: 200px; /* Alto fijo */
           object-fit: cover; /* Ajusta la imagen sin deformarla (recorta si es necesario) */

            margin-right: auto;
           display: flex;
           /* Activa el sistema Flexbox para organizar y centrar elementos */
           justify-content: center;
           /* Centra el contenido horizontalmente */
           align-items: center;
           /* Centra el contenido verticalmente */
}

        /* Imagen */
        .bloque img {
            width: 80%;
            height: auto;
        }

        /* Encabezado */
        .bloque h2 {
            margin-top: 10px;    
        }

        /* Texto */
        .bloque p {
            line-height: 1.5;
