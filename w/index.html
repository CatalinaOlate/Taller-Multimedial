<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ale Olate - Portafolio Interactivo</title>
    <style>
        /* --- ESTILOS BASE (Mantenidos) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #bcbcbc;
            margin: 0;
            padding-top: 70px;
            scroll-behavior: smooth;
        }

        .navbar {
            background-color: #000;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #333;
        }

        .navbar a {
            color: white;
            padding: 20px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        /* --- SECCIÓN PERFIL --- */
        .seccion-perfil {
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
            padding: 40px 20px;
        }

        .perfil-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #333;
        }

        /* --- GALERÍA CLICABLE --- */
        .contenedor-galeria {
            max-width: 1200px;
            margin: 0 auto 60px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .bloque {
            background-color: #282828;
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
            text-align: left;
            cursor: pointer; /* Indica que es clickeable */
            border: 1px solid transparent;
        }

        .bloque:hover {
            transform: translateY(-10px);
            background-color: #333;
            border-color: #555;
        }

        .bloque img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* --- VENTANA MODAL (LA SECCIÓN QUE SE ABRE) --- */
        .modal {
            display: none; /* Oculta por defecto */
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9); /* Fondo oscuro transparente */
            backdrop-filter: blur(5px);
            overflow: auto;
        }

        .modal-contenido {
            background-color: #222;
            margin: 5% auto;
            padding: 40px;
            border: 1px solid #444;
            width: 80%;
            max-width: 900px;
            border-radius: 20px;
            position: relative;
            color: #fff;
            animation: aparecer 0.4s;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .cerrar-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #787878;
            cursor: pointer;
        }

        .cerrar-modal:hover { color: white; }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        #modal-img {
            width: 100%;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .modal-grid { grid-template-columns: 1fr; }
            .modal-contenido { margin: 10% auto; width: 90%; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="#inicio">Inicio</a>
        <a href="#obras">Obras</a>
    </nav>

    <section id="inicio" class="seccion-perfil">
        <img src="img/portada.jpg" alt="Ale Olate" class="perfil-img">
        <h1>Ale Olate</h1>
        <p>Hablo desde la corporalidad en un contexto en el que el cuerpo y su percepción deja de ser algo rígido y limitado.</p>
    </section>

    <h2 id="obras" style="text-align: center; color: #fff;">MI OBRA</h2>
    <div class="contenedor-galeria">

        <div class="bloque" onclick="abrirObra('Cuerpos Fantasmas', 'img/imagen1.JPG', '2024 - Fotografía.\nCoautor: Alex Correa y Mocka Águila.\n\n     ')">
            <img src="img/imagen1.JPG" alt="Cuerpos Fantasmas">
            <h2>Cuerpos Fantasmas</h2>
            <p>2024 - Fotografía</p>
        </div>

        <div class="bloque" onclick="abrirObra('Psique y Soma', 'img/imagen4.jpg', '2026 - Acrílico sobre lienzo.\n\nEsta obra explora la conexión entre la mente y la materia a través de trazos abstractos.')">
            <img src="img/imagen4.jpg" alt="Psique y Soma">
            <h2>Psique y Soma</h2>
            <p>2026 - Acrílico</p>
        </div>

        <div class="bloque" onclick="abrirObra('Cuerpo-Objeto', 'img/imagen5.JPG', '2025 - Fotografía.\n\nEstudio visual sobre la deshumanización del cuerpo en la era industrial.')">
            <img src="img/imagen5.JPG" alt="Cuerpo-Objeto">
            <h2>Cuerpo-Objeto</h2>
            <p>2025 - Fotografía</p>
        </div>

        <div class="bloque" onclick="abrirObra('Materialización Mental', 'img/imagen8.jpg', '2026 - Técnica Mixta.\n\nAcrílico sobre lienzo, pulpa de papel, harina y pegamento.')">
            <img src="img/imagen8.jpg" alt="Materialización Mental">
            <h2>Materialización Mental</h2>
            <p>2026 - Mixta</p>
        </div>

    </div>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <span class="cerrar-modal" onclick="cerrarObra()">&times;</span>
            <div class="modal-grid">
                <img id="modal-img" src="" alt="">
                <div>
                    <h2 id="modal-titulo" style="color: #fff; font-size: 2rem;"></h2>
                    <p id="modal-desc" style="line-height: 1.8; color: #bcbcbc; white-space: pre-line;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirObra(titulo, imagen, descripcion) {
            document.getElementById("modal-titulo").innerText = titulo;
            document.getElementById("modal-img").src = imagen;
            document.getElementById("modal-desc").innerText = descripcion;
            document.getElementById("miModal").style.display = "block";
            // Bloquear el scroll de la página principal
            document.body.style.overflow = "hidden";
        }

        function cerrarObra() {
            document.getElementById("miModal").style.display = "none";
            // Devolver el scroll
            document.body.style.overflow = "auto";
        }

        // Cerrar si el usuario hace clic fuera de la caja blanca
        window.onclick = function(event) {
            let modal = document.getElementById("miModal");
            if (event.target == modal) {
                cerrarObra();
            }
        }
    </script>

</body>
</html>
